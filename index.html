<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KNUST Lost & Found</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="images/knust-logo.png" alt="KNUST Logo" class="logo-img">
        <span class="site-title">KNUST Lost &amp; Found</span>
      </div>
      <nav class="navbar">
        <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i> Home</a>
        <a href="report.html" class="nav-item"><i class="fa-solid fa-circle-info"></i> Report</a>
        <a href="my-posts.html" class="nav-item"><i class="fa-solid fa-box"></i> My Posts</a>
        <a href="about.html" class="nav-item"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="login.html" class="nav-item" id="loginLogoutBtn"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Search and Filter</h1>

        <div class="search-filter-container">
          <input id="search-input" type="text" placeholder="Search items..." aria-label="Search items" />
          <select id="type-filter">
            <option value="">All Types</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>
          <select id="category-filter">
            <option value="">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Personal Items">Personal Items</option>
            <option value="Keys">Keys</option>
            <option value="Clothing">Clothing</option>
            <option value="Documents">Documents</option>
            <option value="Other">Other</option>
          </select>
          <select id="status-filter">
            <option value="">All Status</option>
            <option value="Open">Open</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
      </section>

      <section class="items-section">
        <h2>Items</h2>
        <div id="items-container"></div>
      </section>
    </main>

    <script src="./js/home.js"></script>
    <script src="./js/nav.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
