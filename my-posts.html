<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Posts — KNUST Lost & Found</title>

    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  </head>

  <body class="my-posts-page">
    <header> 
      <div class="logo">
        <img src="images/knust-logo.png" alt="KNUST Logo" class="logo-img">
        <span class="site-title">KNUST Lost &amp; Found</span>
      </div>
      <nav class="navbar">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
        <a href="report.html" class="nav-item"><i class="fa-solid fa-circle-info"></i> Report</a>
        <a href="my-posts.html" class="nav-item active"><i class="fa-solid fa-box"></i> My Posts</a>
        <a href="about.html" class="nav-item"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="login.html" class="nav-item"><i class="fa-solid fa-right-to-bracket"></i> Login
</a>
      </nav>
    </header> 

    <div class="hero-section">
      <h1>My Posts</h1>
      <p class="hero-subtitle">Manage your lost and found items</p>
    </div>


    <div class="page-content">
      <div class="dashboard-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
          <div class="avatar" id="sidebarAvatar">KA</div>
          <h3 class="user-name" id="sidebarName">...</h3>
          <p class="user-id" id="sidebarId">...</p>
          <p class="user-since" id="sidebarSince">...</p>
          <span class="user-badge" id="sidebarBadge">...</span>
          <nav class="sidebar-nav">
            <a href="#" class="sidebar-item" id="overviewBtn">
              <i class="fa-solid fa-chart-line"></i> Overview
            </a>
            <a href="#" class="sidebar-item" id="notificationsBtn">
                    <i class="fa-solid fa-bell"></i> Notifications
                    <span class="notif-badge">0</span>
                  </a>
                  <a href="#" class="sidebar-item" id="settingsBtn">
              <i class="fa-solid fa-gear"></i> Settings
            </a>
            <a href="#" class="sidebar-item active" id="myPostsBtn">
              <i class="fa-solid fa-box"></i> My Posts
            </a>
          </nav>
        </aside>
      
        <!-- MAIN CONTENT -->
        <div class="main-content">

          <!-- OVERVIEW SECTION -->
          <div id="overviewSection" style="display:none;">
            <h2 class="section-heading">Overview</h2>
            <div class="overview-stats">
              <div class="stat-card">
                <i class="fa-solid fa-layer-group"></i>
                <p class="stat-number" id="totalPosts">0</p>
                <p class="stat-label">Total Posts</p>
              </div>
              <div class="stat-card lost">
                <i class="fa-solid fa-circle-xmark"></i>
                <p class="stat-number" id="lostCount">0</p>
                <p class="stat-label">Lost Items</p>
              </div>
              <div class="stat-card found">
                <i class="fa-solid fa-circle-check"></i>
                <p class="stat-number" id="foundCount">0</p>
                <p class="stat-label">Found Items</p>
              </div>
              <div class="stat-card resolved">
                <i class="fa-solid fa-handshake"></i>
                <p class="stat-number" id="resolvedCount">0</p>
                <p class="stat-label">Matched</p>
              </div>
            </div>
            <h3 class="section-subheading">All Posts</h3>
            <div id="overviewPostsList"></div>
          </div>

          <!-- NOTIFICATIONS SECTION -->
<div id="notificationsSection" style="display:none;">
  <h2 class="section-heading">Notifications</h2>
  <div class="notifications-list" id="notificationsList"></div>
</div>
          <!-- SETTINGS SECTION -->
          <div id="settingsSection" style="display:none;">
  <h2 class="section-heading">Settings</h2>
  <div class="settings-form">
    <div class="settings-field">
      <label>Full Name</label>
      <input type="text" id="settings-name" placeholder="Full Name">
    </div>
    <div class="settings-field">
      <label>Email</label>
      <input type="email" id="settings-email" placeholder="Email">
    </div>
    <div class="settings-field">
      <label id="settings-id-label">ID Number</label>
      <input type="text" id="settings-id" placeholder="ID Number">
    </div>
    <div class="settings-field">
      <label>Current Password</label>
      <input type="password" id="settings-current-password" placeholder="Enter current password">
    </div>
    <div class="settings-field">
      <label>New Password</label>
      <input type="password" id="settings-new-password" placeholder="Enter new password">
    </div>
    <div class="settings-field">
      <label>Confirm Password</label>
      <input type="password" id="settings-confirm-password" placeholder="Confirm new password">
    </div>
    <div class="settings-actions">
      <button class="save-btn">Save Changes</button>
      <button class="cancel-btn" id="cancelSettings">Cancel</button>
    </div>
  </div>
</div>

          <!-- MY POSTS SECTION -->
          <div id="postsSection">
            <div id="my-posts-container">
              <p>Loading your posts...</p>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script src="./js/my-posts.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
